<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Stego-Chat: Spy Edition</title>
    <style>
        :root { --spy-green: #00ff41; --spy-bg: #0a0a0a; --spy-border: #333; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--spy-bg); color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        #chat-container { width: 100%; max-width: 800px; display: grid; grid-template-rows: 1fr auto; height: 90vh; border: 1px solid var(--spy-border); background: #111; border-radius: 8px; overflow: hidden; }
        #messages { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .message { padding: 10px; border-radius: 5px; max-width: 80%; position: relative; }
        .message.text { background: #222; align-self: flex-start; border-left: 3px solid var(--spy-green); }
        .message.stego { background: #1a1a1a; align-self: flex-end; border-right: 3px solid #ff4444; width: 300px; cursor: pointer; }
        .stego-indicator { position: absolute; top: -10px; right: -10px; font-size: 20px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .control-panel { padding: 20px; background: #181818; border-top: 1px solid var(--spy-border); display: flex; flex-direction: column; gap: 15px; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 4px; border: 1px solid var(--spy-border); background: #000; color: var(--spy-green); outline: none; }
        button { padding: 12px 20px; border-radius: 4px; border: none; background: var(--spy-green); color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        button:disabled { background: #444; cursor: not-allowed; }

        .secure-zone { border: 1px dashed #444; padding: 15px; border-radius: 4px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }

        #staging-area { grid-column: span 2; background: #222; padding: 15px; border-radius: 4px; display: none; flex-direction: column; gap: 10px; border: 1px solid var(--spy-green); margin-top: 10px; }
        .staging-controls { display: flex; gap: 10px; }
        .staging-controls button { flex: 1; }

        .destruct-text { color: #ff4444; font-weight: bold; margin-bottom: 5px; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 25px; border: 2px solid var(--spy-green); z-index: 1000; box-shadow: 0 0 50px rgba(0,255,65,0.2); width: 300px; text-align: center; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>

        <div class="control-panel">
            <!-- Standard Chat Area -->
            <div class="input-row">
                <input type="text" id="text-input" placeholder="Transmit cleartext message...">
                <button id="send-text-btn">SEND</button>
            </div>

            <!-- Secure Audio Area -->
            <div class="secure-zone">
                <div class="full-width" style="color: #666; font-size: 12px; margin-bottom: 5px;">SECURE STEGO UPLINK</div>
                <input type="text" id="secret-msg" placeholder="Hidden Message">
                <input type="password" id="enc-key" placeholder="AES Key">
                <div class="file-input-wrapper">
                    <button type="button">📎 UPLOAD CARRIER</button>
                    <input type="file" id="carrier-upload" accept="audio/*">
                </div>
                <button id="record-btn">🎤 RECORD</button>

                <!-- Staging Area (Hidden by default) -->
                <div id="staging-area">
                    <div style="color: var(--spy-green); font-size: 12px; font-weight: bold;">STAGED AUDIO PREVIEW</div>
                    <div id="staging-waveform"></div>
                    <div class="staging-controls">
                        <button id="send-staged-btn">🚀 HIDE & SEND SECURE PAYLOAD</button>
                        <button id="cancel-staged-btn" style="background: #ff4444; color: white;">CANCEL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="decrypt-modal" class="modal">
        <h3 style="color: var(--spy-green)">🔐 ENCRYPTED DATA</h3>
        <p>Enter extraction password:</p>
        <input type="password" id="modal-pass" style="width: 80%; margin-bottom: 15px;">
        <button id="submit-decrypt">EXTRACT</button>
        <button onclick="closeModal()" style="background: #444; color: white; margin-left: 5px;">CANCEL</button>
    </div>
    <div id="modal-overlay" class="overlay"></div>

    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
    <script>
        function closeModal() {
            document.getElementById('decrypt-modal').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
