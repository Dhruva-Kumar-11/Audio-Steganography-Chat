<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-LINK // DASHBOARD_v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Upper Row: Metadata Cards -->
        <div class="metadata-grid">
            <div class="data-card">
                <div class="data-card-inner">
                    <div class="card-title">SYSTEM STATUS</div>
                    <div class="card-value">
                        <span class="dot"></span>
                        <span class="status-magenta">Operational</span>
                    </div>
                    <button class="btn-magenta" onclick="window.showToast('SYSTEM_SYNC_COMPLETE')" style="margin-top: 10px; font-size: 9px; padding: 5px 10px;">SYSTEM CHECK</button>
                    <div class="sync-status-text">Verifying Network Integrity</div>
                </div>
            </div>
            
            <div class="data-card">
                <div class="data-card-inner">
                    <div class="card-title">LSB DENSITY</div>
                    <div class="card-value">
                        <span class="status-cyan">12%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: 12%;"></div>
                    </div>
                </div>
            </div>

            <div class="data-card">
                <div class="data-card-inner">
                    <div class="card-title">ACTIVE CHANNELS</div>
                    <div class="card-value">
                        <span id="user-count-val" class="status-amber">1</span>
                    </div>
                    <div style="font-size: 9px; color: #555; margin-top: 5px;">STABLE_UPLINK</div>
                </div>
            </div>

            <div class="data-card">
                <div class="data-card-inner">
                    <div class="card-title">COVERT ENTRYPOINTS</div>
                    <div class="card-value">
                        <span style="font-size: 14px;">🌐 Secure</span>
                    </div>
                    <div id="ping-val" style="font-size: 9px; color: #555; margin-top: 5px;">24ms</div>
                </div>
            </div>
        </div>

        <!-- Lower Row: Primary Modules -->
        <div class="main-grid">
            <!-- Left: Audit Log -->
            <div class="module-card">
                <div class="module-card-inner">
                    <div class="module-header">SYSTEM_AUDIT_LOG</div>
                    <div id="audit-log"></div>
                </div>
            </div>

            <!-- Center: Chat Interface -->
            <div id="chat-interface" class="module-card">
                <div class="module-card-inner">
                    <div class="module-header">SECURE_COMM_INTERFACE</div>
                    <div id="chat-feed"></div>
                    
                    <div class="control-section">
                        <div id="user-display" style="font-size: 10px; color: #666; margin-bottom: 10px;">IDENT: [RETRIEVING...]</div>
                        
                        <div class="input-row">
                            <input type="text" id="text-input" placeholder="> SEND_CLEARTEXT_DATA...">
                            <button id="send-text-btn">TRANSMIT</button>
                        </div>

                        <div style="border: 1px dashed #333; padding: 15px; margin-top: 10px;">
                            <div style="font-size: 10px; color: #555; margin-bottom: 10px;">[ COVERT_PAYLOAD_SUBSYSTEM ]</div>
                            <div class="input-row" style="margin-bottom: 10px;">
                                <input type="text" id="secret-msg" placeholder="> HIDDEN_PAYLOAD">
                                <input type="password" id="enc-key" placeholder="> AES_KEY">
                            </div>
                            
                            <div class="input-row">
                                <button style="flex: 1; position: relative; overflow: hidden;">
                                    📎 CARRIER_UPLOAD
                                    <input type="file" id="carrier-upload" accept="audio/*" style="position: absolute; top: 0; left: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;">
                                </button>
                                <button id="record-btn" onclick="startRecording()" style="flex: 1;">🎤 RECORD_VOICE</button>
                                <button id="stop-btn" onclick="forceStopRecording(event)" style="flex: 1; display: none;">🛑 STOP_SESSION</button>
                            </div>

                            <div id="mic-animation" style="margin-top: 10px;">
                                <div class="wave-bar" style="animation: wavePulse 1s infinite 0.1s"></div>
                                <div class="wave-bar" style="animation: wavePulse 1s infinite 0.3s"></div>
                                <div class="wave-bar" style="animation: wavePulse 1s infinite 0.5s"></div>
                                <span style="font-size: 9px; color: var(--vivid-magenta); margin-left: 10px;">CAPTURING_AUDIO...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Secure Vault -->
            <div class="module-card">
                <div class="module-card-inner">
                    <div class="module-header">SECURE_VAULT_v1.0</div>
                    <div id="vault-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
    <script>
        const user = localStorage.getItem('username') || 'ANON_AGENT';
        document.getElementById('user-display').textContent = `IDENT: [${user.toUpperCase()}]`;

        window.showToast = function(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if(isError) toast.style.borderLeftColor = 'var(--accent-magenta)';
            toast.textContent = `> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = '0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
        window.alert = (msg) => window.showToast(msg, msg.toLowerCase().includes('fail') || msg.toLowerCase().includes('denied'));
    </script>
</body>
</html>
