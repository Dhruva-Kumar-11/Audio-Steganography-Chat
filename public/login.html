<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-LINK // AUTHENTICATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --glass-bg: rgba(10, 10, 10, 0.85);
            --border-glow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matrix Rain Background */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--neon-cyan);
            padding: 3rem;
            border-radius: 4px;
            width: 400px;
            box-shadow: var(--border-glow);
            position: relative;
            z-index: 10;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glitch-wrapper {
            position: relative;
            margin-bottom: 2rem;
            text-align: center;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            text-shadow: 2px 2px var(--neon-pink);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--neon-pink); }
            2% { text-shadow: -3px -3px var(--neon-cyan); }
            4% { text-shadow: 2px 2px var(--neon-pink); }
            96% { text-shadow: 2px 2px var(--neon-pink); }
            98% { text-shadow: 4px 4px var(--neon-cyan); }
            100% { text-shadow: 2px 2px var(--neon-pink); }
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            transition: 0.3s;
            border-radius: 0;
        }

        input:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 0;
            background: transparent;
        }

        .btn-login {
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .btn-login:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .btn-register {
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
        }

        .btn-register:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        /* Toast Styles */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .toast {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 15px 25px;
            margin-top: 10px;
            font-family: 'Share Tech Mono', monospace;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            animation: toastIn 0.3s ease-out;
            border-left: 5px solid var(--neon-cyan);
        }

        .toast.error {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            border-left-color: var(--neon-pink);
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="login-card">
        <div class="glitch-wrapper">
            <h2 data-text="CYBER-LINK">CYBER-LINK</h2>
        </div>
        <div class="input-group">
            <input type="text" id="username" placeholder="> ACCESS_ID" required autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="> PASSWORD_KEY" required>
        </div>
        <div class="btn-container">
            <button class="btn-login" onclick="loginUser()">[ INITIALIZE ]</button>
            <button class="btn-register" onclick="registerUser()">[ REGISTER_NEW ]</button>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0ff';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Toast logic (to be used by auth.js)
        window.showToast = function(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = `> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = '0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // Intercept alert for existing logic
        window.alert = function(msg) {
            const isError = msg.toLowerCase().includes('fail') || msg.toLowerCase().includes('error') || msg.toLowerCase().includes('exist');
            window.showToast(msg, isError);
        };
    </script>
    <script src="auth.js"></script>
</body>
</html>
