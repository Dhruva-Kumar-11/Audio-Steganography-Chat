<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhisperNet — Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #050505;
            --bg-glass: rgba(17, 17, 18, 0.85);
            --text-main: #E0E0E0;
            --electric-cyan: #00f2ff;
            --vivid-magenta: #ff00ea;
            --glass-border: linear-gradient(135deg, #00ffff, #ff00ff);
        }

        * { 
            box-sizing: border-box; 
            border-radius: 0 !important;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-obsidian);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matrix Rain Background */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.2;
        }

        /* Subtle Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            z-index: 2;
            background-size: 100% 2px;
            pointer-events: none;
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            padding: 3.5rem;
            width: 420px;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid transparent;
            background: var(--glass-border) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            opacity: 0.4;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 242, 255, 0.1);
        }

        .login-card:hover::before {
            opacity: 1;
        }

        .header-wrapper {
            margin-bottom: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-main);
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            color: #888;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            pointer-events: auto !important;
            position: relative;
            z-index: 100;
        }

        input:focus {
            border-color: var(--electric-cyan);
            box-shadow: 0 0 15px var(--electric-cyan);
            background: rgba(0, 242, 255, 0.05);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 2rem;
        }

        button {
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            border: 1px solid var(--electric-cyan);
            color: var(--electric-cyan);
            position: relative;
            overflow: hidden;
            pointer-events: auto !important;
            z-index: 100;
        }

        button:hover {
            background: var(--electric-cyan);
            color: #000;
            box-shadow: 0 0 25px var(--electric-cyan);
        }

        .btn-register {
            border-color: var(--vivid-magenta);
            color: var(--vivid-magenta);
        }

        .btn-register:hover {
            background: var(--vivid-magenta);
            color: #000;
            box-shadow: 0 0 25px var(--vivid-magenta);
        }

        /* Toast Styles */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .toast {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 15px 25px;
            margin-top: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 700;
            border-left: 4px solid var(--electric-cyan);
            animation: toastIn 0.3s ease-out;
        }

        .toast.error {
            border-left-color: var(--vivid-magenta);
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="login-card">
        <div class="header-wrapper">
            <img src="logo.png" alt="WhisperNet Logo" class="login-logo">
            <h2>WhisperNet</h2>
        </div>
        <form id="login-form" onsubmit="event.preventDefault();">
            <div class="input-group">
                <span class="label">SECURE_ACCESS_ID</span>
                <input type="text" id="username" placeholder="> ID_STATION_01" required autocomplete="off">
            </div>
            <div class="input-group">
                <span class="label">ENCRYPTION_KEY</span>
                <input type="password" id="password" placeholder="> ********" required>
            </div>
            <div class="btn-container">
                <button type="button" onclick="loginUser()">INITIALIZE_SESSION</button>
                <button type="button" class="btn-register" onclick="registerUser()">REGISTER_NEW_NODE</button>
            </div>
        </form>
    </div>
    <div id="toast-container"></div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0ff';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Toast logic (to be used by auth.js)
        window.showToast = function(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = `> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = '0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // Intercept alert for existing logic
        window.alert = function(msg) {
            const isError = msg.toLowerCase().includes('fail') || msg.toLowerCase().includes('error') || msg.toLowerCase().includes('exist');
            window.showToast(msg, isError);
        };
    </script>
    <script src="auth.js"></script>
</body>
</html>
